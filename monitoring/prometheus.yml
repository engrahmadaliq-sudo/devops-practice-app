global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "devops-practice-app"
    metrics_path: "/actuator/prometheus"
    static_configs:
      # "host.docker.internal" lets Prometheus (in a container) reach
      # the app running on your host machine, or use the app's
      # container name (e.g. "devops-practice-app:8080") if it's
      # running in the same docker-compose network.
      - targets: ["host.docker.internal:8080"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
